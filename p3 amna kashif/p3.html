<!DOCTYPE html>
<html>
<head>
    <title>Interactive Web Elements</title>

    <style>
        body{
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
            transition: 0.5s;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .dark{
            background-color: black;
            color: white;
        }
    </style>
</head>

<body>

    <h1 id="heading">Welcome to Project 3</h1>

    <p id="message">Click any button below.</p>

    <button onclick="changeText()">Change Text</button>

    <button onclick="increaseCount()">Counter</button>

    <button onclick="toggleMode()">Dark Mode</button>

    <h2 id="count">Count: 0</h2>

    <script>

        let number = 0;

        function changeText() {
            document.getElementById("message").innerHTML =
            "Text Updated Successfully!";
        }

        function increaseCount() {
            number++;
            document.getElementById("count").innerHTML =
            "Count: " + number;
        }

        function toggleMode() {
            document.body.classList.toggle("dark");
        }

    </script>

</body>
</html>
